<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dars Mashg'uloti</title>
    <link rel="stylesheet" href="training.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="database.js"></script>
</head>
<body>

    <!-- HEADER (Tepa qism: Ortga qaytish ikonka to'g'rilangan variant) -->
    <div class="header-training">
        <a href="index.html" class="nav-icon-btn home-btn"><i class="fa-solid fa-house"></i></a>
        <div class="main-lesson-title" id="lessonTitle">Mavzu...</div>
        <div>
            <select class="lang-select-training" id="langSelect" onchange="toggleLessonLanguage(this.value)">
                <option value="uz">O'Z</option>
                <option value="ru">RU</option>
            </select>
        </div>
        <!-- Chiqish ikonkasini chapga ko'rsatuvchi strelkaga almashtirdik ✅ -->
        <a href="javascript:history.back()" class="nav-icon-btn back-btn" title="Ortga qaytish">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
    </div>
    <div class="top-materials-bar">
        <button class="material-btn text-m-btn active" onclick="loadContent('text')">
            <i class="fa-solid fa-file-lines"></i> <span>Text</span>
        </button>
        <button class="material-btn video-m-btn" onclick="loadContent('video')">
            <i class="fa-solid fa-play"></i> <span>Video</span>
        </button>
        <button class="material-btn keywords-m-btn" onclick="loadContent('keywords')">
            <i class="fa-solid fa-key"></i> <span>Keywords</span>
        </button>
        <button class="material-btn test-m-btn" onclick="loadContent('test')">
            <i class="fa-solid fa-square-check"></i> <span>Test</span>
        </button>
    </div>

    <div id="displayWindow" class="material-window" style="position: relative;">
    <button id="resizeBtn" onclick="toggleFullscreen()" ...> ... </button>
    
    <div id="fixedAudioPlayerPlace"></div>

    <div id="textContainer" class="window-content-zone"></div>
    <iframe id="iframeViewer" ...></iframe>
</div>
            </button>
            
            <div id="textContainer" class="scrollable-text-content"></div>
            
            <iframe id="iframeViewer" class="iframe-display" src="" allowfullscreen></iframe>
        </div>
    </div>

    <div class="games-divider-zone" id="gamesDivider">
        <span id="gamesTitleText">GAMELAR RO'YXATI</span>
    </div>

    <div class="games-grid" id="gamesGrid">
        <button class="game-card-btn matchup-g-btn" onclick="loadContent('matchup')">
            <div class="game-icon"><i class="fa-solid fa-puzzle-piece"></i></div>
            <div class="game-info">Match up <i class="fa-solid fa-angle-right"></i></div>
        </button>
        
        <button class="game-card-btn anagrama-g-btn" onclick="loadContent('anagrama')">
            <div class="game-icon"><i class="fa-solid fa-arrow-shuffle"></i></div>
            <div class="game-info">Anagrama <i class="fa-solid fa-angle-right"></i></div>
        </button>
        
        <button class="game-card-btn typeanswer-g-btn" onclick="loadContent('typeanswer')">
            <div class="game-icon"><i class="fa-solid fa-keyboard"></i></div>
            <div class="game-info">Type answer <i class="fa-solid fa-angle-right"></i></div>
        </button>
        
        <button class="game-card-btn wordsearch-g-btn" onclick="loadContent('wordsearch')">
            <div class="game-icon"><i class="fa-solid fa-table-cells"></i></div>
            <div class="game-info">Word search <i class="fa-solid fa-angle-right"></i></div>
        </button>
        
        <button class="game-card-btn pair-g-btn" onclick="loadContent('pair')">
            <div class="game-icon"><i class="fa-solid fa-clone"></i></div>
            <div class="game-info">Pair / Nopair <i class="fa-solid fa-angle-right"></i></div>
        </button>
    </div>

    <script>
    // URL manzilidan dinamik ID ni olish (?book=ess1&unit=1)
    const urlParams = new URLSearchParams(window.location.search);
    const bookCode = urlParams.get('book') || "ess1";
    const unitId = urlParams.get('unit') || "1";
    const lessonKey = `${bookCode}_${unitId}`;

    // Tanlangan tilni aniqlash
    let currentLang = localStorage.getItem('selectedLang') || 'uz';
    if(currentLang === 'en') currentLang = 'uz'; 
    
    // database.js faylidagi bazadan darsni qidirish
    // Agar dars bazada topilmasa, xato bermasligi uchun 1-darsni standart qilib qo'yamiz
    const lessonDataFull = lessonsDatabase[lessonKey] || lessonsDatabase["ess1_1"];
    let currentLessonData = lessonDataFull[currentLang];

    // Sahifa ilk bor ochilganda yuklash
    window.onload = function() {
        document.getElementById("langSelect").value = currentLang;
        renderLessonContent();
        loadContent('text');
    }

    // Til o'zgarganda dars ma'lumotlarini almashtirish
    function toggleLessonLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('selectedLang', lang);
        currentLessonData = lessonDataFull[lang];
        renderLessonContent();
        loadContent('text'); 
    }

    // Sarlavhalarni interfeysga chizish
    function renderLessonContent() {
        document.getElementById("lessonTitle").innerText = currentLessonData.title;
        document.getElementById("gamesTitleText").innerText = currentLessonData.gamesTitle;
    }

    // Tugmalar bosilganda kontentni iframe yoki matn oynasiga yuklash
    function loadContent(type) {
    const textZone = document.getElementById("textContainer");
    const iframeZone = document.getElementById("iframeViewer");
    
    const allBtns = document.querySelectorAll(".material-btn, .game-card-btn");
    allBtns.forEach(btn => btn.classList.remove("active"));

    let targetBtn = document.querySelector("." + type + "-m-btn") || document.querySelector("." + type + "-g-btn");
    if(targetBtn) {
        targetBtn.classList.add("active");
    }

    textZone.style.display = "none";
    iframeZone.style.display = "none";
    iframeZone.src = "";

if (type === 'text') {
        const playerPlace = document.getElementById("fixedAudioPlayerPlace");
        
        if (currentLessonData.audioUrl) {
            // Pleyerni tepadagi maxsus joyga chiqaramiz
            playerPlace.innerHTML = `
                <div class="audio-player-container">
                    <audio id="lessonAudio" src="${currentLessonData.audioUrl}"></audio>
                    <div class="player-controls">
                        <button onclick="rewindAudio(-10)" class="p-btn"><i class="fa-solid fa-backward"></i></button>
                        <button onclick="toggleAudio()" id="playPauseBtn" class="p-btn main-play"><i class="fa-solid fa-play"></i></button>
                        <button onclick="rewindAudio(10)" class="p-btn"><i class="fa-solid fa-forward"></i></button>
                        
                        <select id="audioSpeed" onchange="changeAudioSpeed(this.value)" class="speed-select">
                            <option value="0.75">0.75x</option>
                            <option value="1.0" selected>1.0x</option>
                            <option value="1.25">1.25x</option>
                            <option value="1.5">1.5x</option>
                        </select>
                    </div>
                    <div class="progress-wrapper">
                        <input type="range" id="audioProgress" value="0" min="0" max="100" oninput="seekAudio(this.value)">
                    </div>
                </div>
            `;
        } else {
            playerPlace.innerHTML = ''; // Agar audio bo'lmasa pleyerni o'chirish
        }

        // Matn oynasiga faqat matnning o'zi yoziladi, pleyer endi uning ichida EMAS!
        textZone.innerHTML = currentLessonData.textHtml;
        textZone.style.display = "block";
        
        initAudioPlayerListeners(); 
        initMobileTooltips(); 
    } else {
        // Agar boshqa bo'limga (Video, Keywords) o'tilsa pleyerni ekrandan yo'qotish
        document.getElementById("fixedAudioPlayerPlace").innerHTML = '';
    }
    // KEYWORDS BO'LIMI: OVOZLI JADVAL YASASH 🔊
    // KEYWORDS BO'LIMI: BIR TEKIS VA TARTIBLI AUDIO JADVAL 🔊
    else if (type === 'keywords') {
        if (currentLessonData.keywordsList && currentLessonData.keywordsList.length > 0) {
            let tableHtml = `<div class="keywords-table-wrapper">
                                <table class="keywords-custom-table">
                                    <thead>
                                        <tr>
                                            <th>Word</th>
                                            <th>Translation</th>
                                        </tr>
                                    </thead>
                                    <tbody>`;
            
            currentLessonData.keywordsList.forEach(item => {
                tableHtml += `<tr>
                                <td class="kw-bold-word">
                                    <div class="word-with-audio">
                                        <button class="speak-btn" onclick="speakWord('${item.word.replace(/'/g, "\\'")}')">
                                            <i class="fa-solid fa-volume-high"></i>
                                        </button>
                                        <span class="actual-word">${item.word}</span>
                                    </div>
                                </td>
                                <td class="kw-translation">${item.translation}</td>
                              </tr>`;
            });
            
            tableHtml += `</tbody></table></div>`;
            textZone.innerHTML = tableHtml;
        } else {
            textZone.innerHTML = `<p style="padding:20px; text-align:center;">Keywords topilmadi.</p>`;
        }
        textZone.style.display = "block";
    }
    else if (type === 'video') {
        iframeZone.src = currentLessonData.videoUrl;
        iframeZone.style.display = "block";
    } else if (type === 'test') {
        iframeZone.src = currentLessonData.testUrl;
        iframeZone.style.display = "block";
    } else {
        if (currentLessonData.games && currentLessonData.games[type]) {
            iframeZone.src = currentLessonData.games[type];
            iframeZone.style.display = "block";
        }
    }
}

    function initMobileTooltips() {
        const tooltips = document.querySelectorAll('.keyword-tooltip');
        tooltips.forEach(item => {
            item.addEventListener('click', function(e) {
                e.stopPropagation();
                alert(this.getAttribute('data-tooltip'));
            });
        });
    }

    let isFull = false;
    function toggleFullscreen() {
        const windowEl = document.getElementById("displayWindow");
        const topBar = document.querySelector(".top-materials-bar");
        const divider = document.getElementById("gamesDivider");
        const grid = document.getElementById("gamesGrid");
        const btnIcon = document.getElementById("resizeBtn").querySelector("i");

        if (!isFull) {
            topBar.style.display = "none";
            divider.style.display = "none";
            grid.style.display = "none";
            windowEl.classList.add("fullscreen-active");
            btnIcon.className = "fa-solid fa-compress";
            isFull = true;
        } else {
            topBar.style.display = "flex";
            divider.style.display = "flex";
            grid.style.display = "grid";
            windowEl.classList.remove("fullscreen-active");
            btnIcon.className = "fa-solid fa-expand";
            isFull = false;
        }
    }
        // So'zlarni inglizcha talaffuz qilish funksiyasi (Text-to-Speech)
// Har qanday qurilmada ovoz chiqishini ta'minlovchi yangi funksiya
function speakWord(word) {
    try {
        // [ ] kabi ortiqcha belgilarni tozalash
        let cleanWord = word.replace(/[\[\]]/g, ''); 
        
        // Agar tizim band bo'lsa, avvalgisini majburlab o'chiramiz
        if (window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel();
        }

        const utterance = new SpeechSynthesisUtterance(cleanWord);
        utterance.lang = 'en-US'; 
        utterance.rate = 0.85; // Bir oz sekinroq va aniqroq talaffuz
        utterance.volume = 1.0; // Maksimal ovoz balandligi
        
        // Telefonlar uchun maxsus: nutq dvigatelini qayta yuklash
        window.speechSynthesis.speak(utterance);
    } catch (error) {
        console.error("Audio xatolik:", error);
    }
}
       // AUDIO PLEYER FUNKSIYALARI
function toggleAudio() {
    const audio = document.getElementById("lessonAudio");
    const btnIcon = document.getElementById("playPauseBtn").querySelector("i");
    
    if (audio.paused) {
        audio.play();
        btnIcon.className = "fa-solid fa-pause";
    } else {
        audio.pause();
        btnIcon.className = "fa-solid fa-play";
    }
}

function rewindAudio(seconds) {
    const audio = document.getElementById("lessonAudio");
    audio.currentTime += seconds;
}

function changeAudioSpeed(speed) {
    const audio = document.getElementById("lessonAudio");
    audio.playbackRate = parseFloat(speed);
}

function seekAudio(value) {
    const audio = document.getElementById("lessonAudio");
    const seekTo = audio.duration * (value / 100);
    audio.currentTime = seekTo;
}

function initAudioPlayerListeners() {
    const audio = document.getElementById("lessonAudio");
    const progressBar = document.getElementById("audioProgress");
    if(!audio || !progressBar) return;

    // Audio vaqti o'zgarganda chiziqni surish
    audio.addEventListener("timeupdate", () => {
        if(audio.duration) {
            const percentage = (audio.currentTime / audio.duration) * 100;
            progressBar.value = percentage;
        }
    });

    // Audio tugaganda pauza belgisini qaytarish
    audio.addEventListener("ended", () => {
        const btnIcon = document.getElementById("playPauseBtn").querySelector("i");
        btnIcon.className = "fa-solid fa-play";
        progressBar.value = 0;
    });
} 
</script>
</body>
</html>
