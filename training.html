<script>
    // 1. URL tarkibidagi ?book=essX&unit=Y parametrlarni aniqlab olish
    const urlParams = new URLSearchParams(window.location.search);
    const currentBookCode = urlParams.get('book') || "ess1"; // Agar bo'sh bo'lsa, ess1
    const currentUnitNumber = urlParams.get('unit') || "1";   // Agar bo'sh bo'lsa, 1

    // 2. database.js faylidan qidiriladigan kalit so'zni yasaymiz (Masalan: "ess1_1")
    const lessonKey = `${currentBookCode}_${currentUnitNumber}`;

    // 3. Sahifa yuklanganda aynan shu unitga tegishli ma'lumotlarni ekranga chiqarish
    window.addEventListener('DOMContentLoaded', () => {
        // lessonsDatabase - database.js faylingizdan kelayotgan global obyekt
        const lessonData = lessonsDatabase[lessonKey];

        if (lessonData) {
            // Hozirgi tanlangan til (uz yoki ru). Agar belgilanmagan bo'lsa, 'uz'
            const currentLang = localStorage.getItem('selectedLang') || 'uz';
            const langData = lessonData[currentLang];

            if (langData) {
                // A. Sarlavhani o'zgartirish (Masalan: Unit 1: The Lion and the Mouse)
                const titleEl = document.getElementById("lessonTitle") || document.querySelector(".main-title");
                if (titleEl) titleEl.innerText = langData.title;

                // B. Audio pleyer linkini o'rnatish
                const audioEl = document.getElementById("audioSource") || document.querySelector("audio");
                if (audioEl) {
                    if (langData.audioUrl) {
                        audioEl.src = langData.audioUrl;
                        audioEl.closest('.audio-player-container').style.display = "block"; // Audioni ko'rsatish
                        audioEl.load(); // Yangi audioni yuklash
                    } else {
                        // Agar darsda audio bo'lmasa, pleyerni yashirib turadi
                        const container = audioEl.closest('.audio-player-container');
                        if (container) container.style.display = "none";
                    }
                }

                // C. Matn (Text) qismini HTML shaklida joylashtirish
                const textContainer = document.getElementById("textTabContent") || document.querySelector(".text-content");
                if (textContainer) textContainer.innerHTML = langData.textHtml;

                // D. Video (YouTube) linkini yangilash
                const videoIframe = document.getElementById("videoIframe") || document.querySelector(".video-container iframe");
                if (videoIframe) {
                    if (langData.videoUrl) {
                        videoIframe.src = langData.videoUrl;
                        videoIframe.style.display = "block";
                    } else {
                        videoIframe.style.display = "none";
                    }
                }

                // E. Test (Google Forms va h.k.) linkini yangilash
                const testIframe = document.getElementById("testIframe") || document.querySelector(".test-container iframe");
                if (testIframe) {
                    if (langData.testUrl) {
                        testIframe.src = langData.testUrl;
                    }
                }

                // F. Wordwall O'yinlarini yangilash (Tugmalarga linklarni biriktirish)
                // O'yin tugmalari o'ziga tegishli iframe linkini data-src orqali ushlab turadi
                setupGameButtons(langData.games);

                // G. Keywords (Lug'at) ro'yxatini yaratish
                renderKeywords(langData.keywordsList);

            }
        } else {
            console.error("Dars topilmadi: " + lessonKey);
            alert("Ushbu unit uchun hozircha database.js faylida ma'lumot mavjud emas!");
        }
    });

    // Wordwall o'yin tugmalariga dinamik linklarni ulash funksiyasi
    function setupGameButtons(gamesData) {
        if (!gamesData) return;
        
        // Har bir o'yin tugmasini ID si bo'yicha topib, linkini o'rnatamiz
        const matchupBtn = document.getElementById("matchupBtn");
        if (matchupBtn) matchupBtn.setAttribute("data-src", gamesData.matchup || "");

        const anagramaBtn = document.getElementById("anagramaBtn");
        if (anagramaBtn) anagramaBtn.setAttribute("data-src", gamesData.anagrama || "");

        const typeanswerBtn = document.getElementById("typeanswerBtn");
        if (typeanswerBtn) typeanswerBtn.setAttribute("data-src", gamesData.typeanswer || "");

        const wordsearchBtn = document.getElementById("wordsearchBtn");
        if (wordsearchBtn) wordsearchBtn.setAttribute("data-src", gamesData.wordsearch || "");

        const pairBtn = document.getElementById("pairBtn");
        if (pairBtn) pairBtn.setAttribute("data-src", gamesData.pair || "");
    }
</script>
